name: Build and push to ECR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t ${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker push ${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update image tag in infra repo
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          git clone https://ochirdorj:${{ secrets.INFRA_REPO_TOKEN }}@github.com/ochirdorj/my-app-infra.git
          cd my-app-infra

          sed -i "s/tag: .*/tag: ${{ env.IMAGE_TAG }}/" apps/my-app/dev/values-dev.yaml
          sed -i "s/tag: .*/tag: ${{ env.IMAGE_TAG }}/" apps/my-app/prod/values-prod.yaml

          git add .
          git commit -m "update image tag to ${{ env.IMAGE_TAG }}"
          git push